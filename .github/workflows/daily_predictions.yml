name: Daily Stock Predictions

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Download model files from releases
        run: |
          mkdir -p backend/models
          gh release download v1.0-models --repo PIYUSH-BAMNIA-25/stocksense --dir backend/models
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run daily predictions
        run: |
          cd backend
          python scheduler/daily_job.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Confirm predictions saved
        run: |
          cd backend
          python -c "
          import sys
          import os
          from supabase import create_client
          from datetime import date

          url = os.environ.get('SUPABASE_URL')
          key = os.environ.get('SUPABASE_KEY')

          if not url or not key:
              print('ERROR: Supabase credentials not set')
              sys.exit(1)

          client = create_client(url, key)
          today = date.today().isoformat()
          result = client.table('predictions').select('ticker').eq('date', today).execute()
          count = len(result.data)
          tickers = [r['ticker'] for r in result.data]
          print(f'Predictions saved today: {count}')
          print(f'Tickers: {tickers}')
          if count < 1:
              print('WARNING: No predictions saved today')
              sys.exit(1)
          print('SUCCESS: Predictions verified')
          "
          env:
            SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
