services:
  - type: web
    name: stocksense-backend
    env: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn main:app 
      --host 0.0.0.0 
      --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
